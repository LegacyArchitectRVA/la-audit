# Legacy Architect RVA -- Audit Email Worker (v2 with Nurture Sequences)
# Deploy: npx wrangler deploy
# Secrets:
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put HUBSPOT_API_KEY

name = "la-audit-email"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
FROM_EMAIL = "Legacy Architect RVA <results@legacyarchitectrva.com>"
ALLOWED_ORIGIN = "https://legacyarchitectrva.com"

# Daily cron at 9:00 AM Eastern (13:00 UTC, accounts for EDT)
[triggers]
crons = ["0 13 * * *"]
