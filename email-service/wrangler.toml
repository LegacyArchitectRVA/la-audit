# Legacy Architect RVA — Audit Email + Nurture Worker
# Deploy: npx wrangler deploy
# Secrets: npx wrangler secret put RESEND_API_KEY
#          npx wrangler secret put HUBSPOT_API_KEY

name = "la-audit-email"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
FROM_EMAIL = "Legacy Architect RVA <results@legacyarchitectrva.com>"
ALLOWED_ORIGIN = "https://legacyarchitectrva.com"

# Daily cron trigger — runs at 10:00 AM ET (14:00 UTC)
[triggers]
crons = ["0 14 * * *"]
